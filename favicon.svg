<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0D0D1F"/>

  <!-- Edges — deterministic (solid, to top nodes) -->
  <line x1="32" y1="32" x2="10" y2="14" stroke="#6366F1" stroke-width="1.8" stroke-opacity="0.85"/>
  <line x1="32" y1="32" x2="54" y2="14" stroke="#6366F1" stroke-width="1.8" stroke-opacity="0.85"/>

  <!-- Edges — probabilistic (dashed, to bottom nodes) -->
  <line x1="32" y1="32" x2="10" y2="50" stroke="#6366F1" stroke-width="1.4" stroke-dasharray="3 2.5" stroke-opacity="0.55"/>
  <line x1="32" y1="32" x2="54" y2="50" stroke="#6366F1" stroke-width="1.4" stroke-dasharray="3 2.5" stroke-opacity="0.55"/>

  <!-- Top nodes — deterministic (brighter) -->
  <circle cx="10" cy="14" r="5" fill="#A5B4FC"/>
  <circle cx="54" cy="14" r="5" fill="#A5B4FC"/>

  <!-- Bottom nodes — probabilistic (dimmer) -->
  <circle cx="10" cy="50" r="4.5" fill="#4F46E5" opacity="0.75"/>
  <circle cx="54" cy="50" r="4.5" fill="#4F46E5" opacity="0.75"/>

  <!-- Hub node -->
  <circle cx="32" cy="32" r="9" fill="#6366F1"/>
  <circle cx="32" cy="32" r="3" fill="white" opacity="0.9"/>
</svg>
