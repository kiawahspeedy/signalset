function getCohortMix(segName, cohortId) {
  // Returns rich consumer composition data
  const seed = (segName.charCodeAt(0) + parseInt(cohortId.replace('C-', ''), 10)) % 7;
  const lifestyles = [['Travel Enthusiasts', 'E-Book Readers', 'Fitness Enthusiasts', 'Gamers'], ['Gamers', 'Heavy Streamers', 'E-Book Readers', 'Travel Enthusiasts'], ['Fitness Enthusiasts', 'Travel Enthusiasts', 'Gamers', 'Heavy Streamers']];
  const inMarket = [['Consumer Electronics', 'Hotels', 'Healthcare', 'Car Rentals'], ['Airlines', 'Snacks', 'Personal Care', 'Consumer Electronics'], ['Hotels', 'Car Rentals', 'Airlines', 'Consumer Electronics']];
  const dmas = {
    'New York Metro': {
      consumers: Math.round(6000 + seed * 2000),
      revenue: Math.round(120000 + seed * 40000),
      cvr: (3.8 + seed * 0.3).toFixed(2),
      impressions: Math.round(40000 + seed * 15000)
    },
    'Los Angeles': {
      consumers: Math.round(5200 + seed * 1800),
      revenue: Math.round(105000 + seed * 35000),
      cvr: (4.1 + seed * 0.25).toFixed(2),
      impressions: Math.round(35000 + seed * 12000)
    },
    'Chicago Metro': {
      consumers: Math.round(4800 + seed * 1600),
      revenue: Math.round(95000 + seed * 30000),
      cvr: (3.6 + seed * 0.28).toFixed(2),
      impressions: Math.round(30000 + seed * 10000)
    },
    'Dallas–Ft. Worth': {
      consumers: Math.round(3900 + seed * 1400),
      revenue: Math.round(78000 + seed * 25000),
      cvr: (3.4 + seed * 0.32).toFixed(2),
      impressions: Math.round(25000 + seed * 9000)
    },
    'San Francisco Bay': {
      consumers: Math.round(3400 + seed * 1200),
      revenue: Math.round(72000 + seed * 22000),
      cvr: (4.4 + seed * 0.2).toFixed(2),
      impressions: Math.round(22000 + seed * 8000)
    },
    'Miami Metro': {
      consumers: Math.round(2800 + seed * 1000),
      revenue: Math.round(58000 + seed * 18000),
      cvr: (3.9 + seed * 0.27).toFixed(2),
      impressions: Math.round(18000 + seed * 7000)
    }
  };
  const ageData = [{
    group: '18–24',
    male: 18 + seed * 2,
    female: 22 + seed * 2,
    other: 4
  }, {
    group: '25–34',
    male: 28 + seed * 3,
    female: 31 + seed * 2,
    other: 5
  }, {
    group: '35–44',
    male: 24 + seed * 2,
    female: 26 + seed * 2,
    other: 4
  }, {
    group: '45–54',
    male: 16 + seed * 1,
    female: 18 + seed * 1,
    other: 3
  }, {
    group: '55–64',
    male: 10 + seed,
    female: 12 + seed,
    other: 2
  }, {
    group: '65+',
    male: 6,
    female: 8,
    other: 2
  }];
  const incomeData = [{
    range: '<$25K',
    male: 12 + seed,
    female: 14 + seed,
    other: 3
  }, {
    range: '$25–35K',
    male: 18 + seed * 2,
    female: 20 + seed * 2,
    other: 4
  }, {
    range: '$35–50K',
    male: 22 + seed * 2,
    female: 24 + seed * 2,
    other: 4
  }, {
    range: '$50–70K',
    male: 20 + seed * 2,
    female: 22 + seed * 2,
    other: 4
  }, {
    range: '$70–100K',
    male: 16 + seed,
    female: 17 + seed,
    other: 3
  }, {
    range: '$100K+',
    male: 10 + seed,
    female: 11 + seed,
    other: 2
  }];
  return {
    purchaseFreq: (4.8 + seed * 0.4).toFixed(2),
    spendPerPurchase: `$${(1.20 + seed * 0.18).toFixed(2)}`,
    avgVolume: `${(1.2 + seed * 0.12).toFixed(2)}L`,
    popularPack: ['375ml', '300ml', '500ml', '250ml', '1L'][seed % 5],
    ageData,
    incomeData,
    lifestyles: lifestyles[seed % 3].map((name, i) => ({
      name,
      male: 18 + (i + seed) * 4,
      female: 20 + (i + seed) * 3,
      other: 3 + i
    })),
    inMarket: inMarket[seed % 3].map((name, i) => ({
      name,
      male: 15 + (i + seed) * 5,
      female: 17 + (i + seed) * 4,
      other: 4 + i
    })),

      cvr: `${(4.1 + seed * 0.3).toFixed(2)}%`,
      impressions: `${Math.round(130000 + seed * 18000).toLocaleString()}`

}

function getCMNDMAInsights(dma) {
  const cities = CMN_DMA_CITIES[dma] || ['City 1', 'City 2', 'City 3', 'City 4', 'City 5'];
  const seed = dma.charCodeAt(0) % 7;
  const row = DMA_DATA.find(d => d.dma === dma) || {
    spend: 200,
    lift: 30,
    reach: 100
  };
  return cities.map((city, i) => {
    const wt = [0.28, 0.22, 0.18, 0.14, 0.11, 0.07][i] || 0.08;
    const baseCAC = 28 + i * 7 + seed * 3;
    const baseLTV = 3400 + i * 180 + seed * 300;
    return {
      name: city,
      consumers: Math.round(row.reach * wt * 1000),
      revenue: Math.round(row.spend * wt * 1000 * 12),
      ltv: baseLTV,
      cac: baseCAC,
      ltvCac: parseFloat((baseLTV / baseCAC).toFixed(1)),
      cvr: (row.lift * 0.048 + 1.8 - i * 0.18 + seed * 0.05).toFixed(2),
      lift: Math.max(8, row.lift + 9 - i * 4),
      impressions: Math.round(row.reach * wt * 3500),
      priority: i < 2 ? 'high' : i < 4 ? 'medium' : 'low'
    };
  });
}

// NEO4J STATUS HOOK — module-level cache, one fetch per session
// Used by App (nav) and MarketingDesk (LIG connection panel)
// ═══════════════════════════════════════════════════════════════
let _neo4jStatusCache = null;
let _neo4jStatusListeners = [];
let _neo4jStatusFetched = false;

function _fetchNeo4jStatus() {
  if (_neo4jStatusFetched) return;
  _neo4jStatusFetched = true;
  fetch('https://signalset-lig-api.tickersignals.workers.dev/api/neo4j/health')
    .then(r => r.json())
    .then(d => {
      _neo4jStatusCache = { connected: d.status === 'ok', nodeCount: d.nodeCount || 0, database: d.database || '' };
      _neo4jStatusListeners.forEach(fn => fn(_neo4jStatusCache));
    })
    .catch(() => {
      _neo4jStatusCache = { connected: false, nodeCount: 0, database: '' };
      _neo4jStatusListeners.forEach(fn => fn(_neo4jStatusCache));
    });
}

function useNeo4jStatus() {
  const [status, setStatus] = React.useState(_neo4jStatusCache);
  React.useEffect(() => {
    if (_neo4jStatusCache) { setStatus(_neo4jStatusCache); return; }
    _neo4jStatusListeners.push(setStatus);
    _fetchNeo4jStatus();
    return () => { _neo4jStatusListeners = _neo4jStatusListeners.filter(fn => fn !== setStatus); };
  }, []);
  return status;
}

  try {

      body: JSON.stringify({ query: 'SELECT COUNT(*) as cnt FROM `project-f99bd3eb-3aa0-4b6d-912.lig_master.mta_paths`' })

    const d = await check.json();
    const cnt = parseInt(d?.rows?.[0]?.f?.[0]?.v || d?.rows?.[0]?.cnt || 0);

async function fetchNeo4jGraph() {
  // Fetch a representative sample: 1 person per segment + their linked nodes
  const query = `
    MATCH (p:Person)
    WITH p ORDER BY p.propensity DESC
    WITH p.segment AS seg, collect(p)[0..2] AS persons
    UNWIND persons AS p
    OPTIONAL MATCH (p)-[r1:LINKED_TO]->(d:Device)
    OPTIONAL MATCH (p)-[r2:PROBABILISTIC_MATCH]->(d2:Device)
    OPTIONAL MATCH (p)-[:HAS_ACCOUNT]->(a:Account)
    OPTIONAL MATCH (p)-[:HAD_INTERACTION]->(i:Interaction)
    OPTIONAL MATCH (p)-[:USED_TERMINAL]->(t:Terminal)
    RETURN p.pid AS pid, p.segment AS segment, p.ltv AS ltv,
           p.propensity AS propensity, p.monthly_spend AS monthly_spend,
           p.fico_proxy AS fico_proxy, p.uid2 AS uid2,
           count(DISTINCT d) AS det_devices,
           count(DISTINCT d2) AS prob_devices,
           count(DISTINCT a) AS accounts,
           count(DISTINCT i) AS interactions,
           count(DISTINCT t) AS terminals
    ORDER BY p.propensity DESC
    LIMIT 10
  `;
  const resp = await fetch(WORKER_URL + '/api/neo4j/query', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ query })
  });
  const data = await resp.json();
  const rows = data?.data?.data?.values || [];

  // Also get segment counts
  const countQuery = `
    MATCH (p:Person)
    RETURN p.segment AS seg, count(p) AS cnt, avg(p.ltv) AS avg_ltv
    ORDER BY cnt DESC
  `;
  const countResp = await fetch(WORKER_URL + '/api/neo4j/query', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ query: countQuery })
  });
  const countData = await countResp.json();
  const segCounts = {};
  (countData?.data?.data?.values || []).forEach(row => {
    const [seg, cnt, ltv] = row || [];
    if (seg) segCounts[seg] = { count: cnt, ltv: Math.round(ltv) };
  });

  // Also get total node counts
  const nodeCountQuery = `
    MATCH (n) RETURN labels(n)[0] AS label, count(n) AS cnt ORDER BY cnt DESC
  `;
  const ncResp = await fetch(WORKER_URL + '/api/neo4j/query', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ query: nodeCountQuery })
  });
  const ncData = await ncResp.json();
  const nodeCounts = {};
  (ncData?.data?.data?.values || []).forEach(row => {
    const [label, cnt] = row || [];
    if (label) nodeCounts[label] = cnt;
  });

  // Transform rows to CUSTOMERS shape
  const customers = rows.map(row => {
    const [pid, seg, ltv, propensity, spend, fico, uid2, detDev, probDev, accounts, interactions, terminals] = row || [];
    const totalDevices = (detDev || 0) + (probDev || 0);
    const segDisplay = SEG_DISPLAY[seg] || seg;
    const shortId = pid ? 'LIG-' + pid.slice(-4).toUpperCase() : 'LIG-????';
    // Per-person initials: last 2 chars of shortId — matches the LIG-XXXX on the detail card
    const initials = shortId.slice(-2);
    const SEG_PERSONA = {'Explorers':'Premium Achiever','Revelers':'Experiential Reveler','Luxuriates':'Luxury Seeker','Bask_Chill':'Bask & Chill Loyalist','Deal_Seekers':'Deal Maximizer'};
    const persona = SEG_PERSONA[seg] || segDisplay;
    return {
      id: shortId,
      pid: pid,
      name: shortId,
      initials: initials,
      segment: persona || seg,
      cluster: segDisplay,
      color: SEG_COLORS[seg] || '#6366F1',
      ltv: ltv ? '$' + Number(ltv).toLocaleString() : 'N/A',
      ltvRaw: ltv || 0,
      score: fico || 720,
      spend: spend ? '$' + Number(spend).toLocaleString() + '/mo' : 'N/A',
      products: accounts || 1,
      mobile: (detDev || 0) + ' det · ' + (probDev || 0) + ' prob',
      intent: propensity || 70,
      propensity: propensity || 70,
      devices: totalDevices,
      interactions: interactions || 0,
      terminals: terminals || 0,
      uid2: uid2 || '',
      live: true
    };
  });

  return { customers, segCounts, nodeCounts };
}

function useNeo4jGraph() {
  const [graphData, setGraphData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);

  React.useEffect(() => {
    fetchNeo4jGraph()
      .then(data => { setGraphData(data); setLoading(false); })
      .catch(err => { setError(err.message); setLoading(false); });
  }, []);

  return { graphData, loading, error };
}

// ── IDENTITY SEARCH · Format Detection (Phase 3.5) ──────────────────
// Returns { type, label, state } where state ∈ 'valid' | 'weak' | 'unknown' | null
function detectIdentityFormat(input) {
  const s = (input || '').trim();
  if (!s) return null;
  // SHA-256 hash: exactly 64 hex chars
  if (/^[a-f0-9]{64}$/i.test(s)) return { type: 'sha256', label: 'SHA-256 ✓', state: 'valid' };
  // UID2 token — Unified ID 2.0 format: prefix "UID2-" or base64-ish 36+ chars
  if (/^UID2-/i.test(s)) return { type: 'uid2', label: 'UID2 ✓', state: 'valid' };
  if (/^[A-Za-z0-9+/=_-]{40,88}$/.test(s) && /[+/=]/.test(s)) return { type: 'uid2', label: 'UID2 ✓', state: 'valid' };
  // MAID / IDFA / GAID — standard UUID format
  if (/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s)) return { type: 'maid', label: 'MAID / IDFA ✓', state: 'valid' };
  // LIG-XXXX (internal) — prefixed or raw 4-char hex
  if (/^LIG-[A-F0-9]{4}$/i.test(s)) return { type: 'lig', label: 'LIG-ID ✓', state: 'valid' };
  if (/^[A-F0-9]{4}$/i.test(s)) return { type: 'lig', label: 'LIG-ID (short)', state: 'weak' };
  // Cookie ID — heuristic: 16+ chars alphanumeric with typical cookie punctuation
  if (s.length >= 16 && /^[A-Za-z0-9_.\-]+$/.test(s)) return { type: 'cookie', label: 'Cookie ID', state: 'weak' };
  // Too short or unrecognized
  return { type: 'unknown', label: 'Format unknown', state: 'unknown' };
}

// State-level data (consumers, revenue, cvr, impressions) for choropleth
function getStateData(segName, cohortId) {
  const seed = (segName.charCodeAt(0) + parseInt(cohortId.replace('C-', ''), 10)) % 9;
  const stateRows = {};
  US_STATES.forEach(([abbr,,,,, name, w]) => {
    const base = w * (8 + seed * 2);
    stateRows[abbr] = {
      name,
      consumers: Math.round(base * 1000 + seed * base * 200),
      revenue: Math.round(base * 10000 + seed * base * 2000),
      cvr: (3.2 + (w + seed) * 0.15).toFixed(2),
      impressions: Math.round(base * 3800 + seed * base * 600)
    };
  });
  // Boost top states
  ['TX', 'CA', 'NY', 'FL'].forEach(s => {
    if (stateRows[s]) {
      stateRows[s].consumers = Math.round(stateRows[s].consumers * 1.4);
      stateRows[s].revenue = Math.round(stateRows[s].revenue * 1.5);
    }
  });
  return stateRows;
}
