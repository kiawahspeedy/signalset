<style>
:root {
  --navy:       #08080F;
  --navy-mid:   #111120;
  --navy-light: #1A1A2E;
  --cyan:       #6366F1;
  --cyan-dim:   #818CF8;
  --cyan-pale:  #C7D2FE;
  --green:      #4ADE80;
  --green-dark: #22C55E;
  --amber:      #F59E0B;
  --red:        #F87171;
  --purple:     #A78BFA;
  --slate:      rgba(238,238,255,.65);
  --slate-lt:   rgba(238,238,255,.35);
  --white:      #EEEEFF;
  --off-white:  #0E0E1A;
  /* ── DARK THEME TOKENS ── */
  --bg:         #08080F;
  --card:       #16163A;
  --card-alt:   #111128;
  --card-alt2:  #0D0D1E;
  --bdr:        rgba(99,102,241,.28);
  --bdr-soft:   rgba(99,102,241,.14);
  --bdr-strong: rgba(99,102,241,.5);
  --text:       #EEEEFF;
  --text-sec:   rgba(238,238,255,.65);
  --font-d:     'Satoshi', sans-serif;
  --font-b:     'Satoshi', sans-serif;
  --font-m:     'IBM Plex Mono', monospace;
  --r:          10px;
  --shadow:     0 2px 20px rgba(0,0,0,.5);
  --shadow-lg:  0 8px 40px rgba(0,0,0,.6);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 17.5px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 1rem;
  line-height: 1.55;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #EEF1F6; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

/* ── TOP NAV ── */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 62px;
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; overflow: visible;
  box-shadow: 0 2px 12px rgba(14,31,56,0.25);
  isolation: auto;
}
.nav-brand { display: flex; align-items: center; gap: 14px; overflow: visible; }
.nav-mark {
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-brand-text { font-family: var(--font-b); font-size: 26px; font-weight: 800; color: #FFFFFF; line-height: 1; letter-spacing: -.024em; }
.nav-brand-text span { color: var(--indigo-lt, #818CF8); font-weight: 900; }
.nav-brand-sub { font-size: 11px; color: rgba(238,238,255,.55); letter-spacing: .15em; text-transform: uppercase; font-family: var(--font-m); margin-top: 5px; }

.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  padding: 6px 11px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: rgba(255,255,255,0.8);
  font-family: var(--font-b); font-size: 15px; font-weight: 600;
  white-space: nowrap;
  cursor: pointer; transition: all 0.18s ease;
}
.nav-tab:hover { color: #FFFFFF; border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); }
.nav-tab.active { background: rgba(99,102,241,0.22); border-color: rgba(99,102,241,0.5); color: var(--cyan); }

.nav-status { display: flex; align-items: center; gap: 7px; font-size: 15px; color: var(--green); font-weight: 500; }
.pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

/* ── MAIN ── */
.main { padding-top: 62px; min-height: 100vh; }
.screen { display: none; }
.screen.active { display: block; }
.desk-screen-wrap { display: flex; flex-direction: column; height: calc(100vh - 62px); overflow: hidden; }

/* ── PHASE 10 UNIT A — ICON RAIL (52px fixed left) ── */
.v11-rail {
  position: fixed; top: 62px; left: 0; bottom: 0; width: 52px;
  background: #06061A;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 0; gap: 4px;
  z-index: 190;
}
.v11-rail-icon {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; cursor: pointer;
  color: rgba(238,238,255,.55);
  transition: all .15s;
  position: relative;
  border: 1px solid transparent;
}
.v11-rail-icon:hover {
  background: rgba(255,255,255,.06);
  color: rgba(238,238,255,.9);
}
/* Active state — border/background colored by section */
.v11-rail-icon.active {
  background: rgba(99,102,241,.18);
  border-color: rgba(99,102,241,.45);
  color: #A5B4FC;
}
.v11-rail-icon.active.section-measurement {
  background: rgba(6,182,212,.18);
  border-color: rgba(6,182,212,.45);
  color: #67E8F9;
}
.v11-rail-icon.active.section-partners {
  background: rgba(167,139,250,.18);
  border-color: rgba(167,139,250,.45);
  color: #C4B5FD;
}
/* Thin vertical bar on the left edge of an active icon — signal of "you are here" */
.v11-rail-icon.active::before {
  content: '';
  position: absolute; left: -10px; top: 8px; bottom: 8px; width: 3px;
  border-radius: 0 2px 2px 0;
  background: currentColor;
}
/* Tooltip on hover — small right-side label */
.v11-rail-icon::after {
  content: attr(data-label);
  position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
  background: rgba(14,14,32,.95); color: #EEEEFF;
  font-size: 12px; font-weight: 600; font-family: var(--font-b);
  padding: 5px 10px; border-radius: 6px; white-space: nowrap;
  border: 1px solid rgba(99,102,241,.25);
  opacity: 0; pointer-events: none;
  transition: opacity .15s .2s;  /* small delay so it doesn't flash */
  z-index: 300;
}
.v11-rail-icon:hover::after { opacity: 1; }
/* Divider line separating sections from settings/avatar */
.v11-rail-divider {
  width: 28px; height: 1px; background: rgba(255,255,255,.08);
  margin: 6px 0;
}
.v11-rail-spacer { flex: 1; }
/* Avatar — DF initials, pinned bottom */
.v11-rail-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #6366F1, #818CF8);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-m); font-weight: 700; font-size: 11px; color: #fff;
  cursor: pointer; transition: transform .15s;
  margin-bottom: 4px;
}
.v11-rail-avatar:hover { transform: scale(1.08); }

/* When rail is active, push main content + top-nav brand right */
body.v11-rail-active .main { margin-left: 52px; }
body.v11-rail-active .top-nav { padding-left: 80px; }

/* ── PHASE 10 UNIT A.5 — THIN TOP STRIP + SIDEBAR + BREADCRUMB ── */
/* When shell is active (Unit A.5), the old .top-nav is hidden and replaced
   by .v11-topstrip. Main content adjusts for rail and optional sidebar. */
body.v11-shell-active .top-nav { display: none; }
body.v11-shell-active .main { padding-top: 56px; margin-left: 52px; }
body.v11-shell-active.v11-sidebar-open .main { margin-left: 312px; /* 52 rail + 260 sidebar */ }
body.v11-shell-active .v11-rail { top: 56px; }

.v11-topstrip {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: 56px;
  background: #06061A;
  display: flex; align-items: center;
  padding: 0;
}
.v11-topstrip-brand-wrap {
  height: 100%; flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 18px 0 20px;
  cursor: pointer;
}
.v11-topstrip-brand {
  display: flex; align-items: center; gap: 12px;
}
.v11-topstrip-brand-mark {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.v11-topstrip-brand-txt {
  font-family: var(--font-b);
  font-size: 22px; font-weight: 800; line-height: 1;
  letter-spacing: -.022em;
  color: #FFFFFF;
}
.v11-topstrip-brand-txt span { color: var(--indigo-lt, #818CF8); font-weight: 900; }

.v11-topstrip-right {
  flex: 1;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 24px;
  min-width: 0;
}
.v11-breadcrumb {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text); font-weight: 600;
  min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.v11-breadcrumb-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #A5B4FC;
  box-shadow: 0 0 6px #A5B4FC;
  flex-shrink: 0;
}
.v11-breadcrumb-dot.section-measurement { background: #67E8F9; box-shadow: 0 0 6px #67E8F9; }
.v11-breadcrumb-dot.section-partners { background: #A78BFA; box-shadow: 0 0 6px #A78BFA; }
.v11-breadcrumb-sep {
  color: rgba(238,238,255,.38); font-size: 11px;
  font-family: var(--font-m);
  flex-shrink: 0;
}
.v11-breadcrumb-crumb {
  color: rgba(238,238,255,.55); font-size: 12px;
  cursor: default;
  overflow: hidden; text-overflow: ellipsis;
}
.v11-topstrip-status {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 11px; border-radius: 20px;
  background: rgba(34,197,94,.08);
  border: 1px solid rgba(34,197,94,.22);
  font-size: 11px; color: #22C55E; font-weight: 600;
  font-family: var(--font-m);
  flex-shrink: 0;
}
.v11-topstrip-status-dot {
  width: 6px; height: 6px; background: #22C55E; border-radius: 50%;
  box-shadow: 0 0 4px #22C55E;
  animation: v11-pulse 2s ease infinite;
}
@keyframes v11-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }

/* Sidebar — 260px, slides in from left of main (to the right of rail) */
.v11-sidebar {
  position: fixed; top: 56px; bottom: 0; left: 52px; width: 260px;
  background: #070718;
  display: flex; flex-direction: column;
  overflow: hidden;
  z-index: 185;
  transform: translateX(-100%);
  transition: transform .22s ease;
}
body.v11-sidebar-open .v11-sidebar { transform: translateX(0); }

.v11-sidebar-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
}
.v11-sidebar-hdr-lbl {
  font-family: var(--font-m); font-size: 10px; font-weight: 700;
  color: rgba(238,238,255,.38); letter-spacing: .12em; text-transform: uppercase;
}
.v11-sidebar-newchat {
  margin: 0 12px 8px;
  padding: 10px 12px; border-radius: 8px;
  display: flex; align-items: center; gap: 9px;
  background: rgba(99,102,241,.12);
  border: 1px solid rgba(99,102,241,.3);
  cursor: pointer; transition: all .15s;
}
.v11-sidebar-newchat:hover { background: rgba(99,102,241,.18); border-color: rgba(99,102,241,.45); }
.v11-sidebar-newchat-lbl { font-size: 13px; font-weight: 600; color: var(--text); }
.v11-sidebar-newchat-shortcut {
  margin-left: auto; font-family: var(--font-m); font-size: 10px;
  color: rgba(238,238,255,.38); background: rgba(99,102,241,.1);
  padding: 2px 6px; border-radius: 4px;
  border: 1px solid rgba(99,102,241,.18);
}
.v11-sidebar-search {
  margin: 0 12px 14px;
  padding: 8px 12px; border-radius: 7px;
  display: flex; align-items: center; gap: 8px;
  background: rgba(14,14,34,.6);
  border: 1px solid rgba(99,102,241,.14);
  cursor: pointer; transition: border-color .15s;
}
.v11-sidebar-search:hover { border-color: rgba(99,102,241,.3); }
.v11-sidebar-search-lbl { font-size: 12px; color: rgba(238,238,255,.55); }

.v11-sidebar-groups {
  flex: 1; overflow-y: auto;
  padding: 0 0 12px;
}
.v11-sidebar-group-lbl {
  padding: 12px 16px 6px;
  font-family: var(--font-m); font-size: 10px; font-weight: 700;
  color: rgba(238,238,255,.38); letter-spacing: .12em; text-transform: uppercase;
}
.v11-sidebar-item {
  margin: 0 8px 2px;
  padding: 9px 12px; border-radius: 7px;
  display: flex; align-items: flex-start; gap: 8px;
  cursor: pointer; transition: background .12s;
  border: 1px solid transparent;
}
.v11-sidebar-item:hover {
  background: rgba(255,255,255,.03);
  border-color: rgba(255,255,255,.05);
}
.v11-sidebar-item.active {
  background: rgba(99,102,241,.08);
  border-color: rgba(99,102,241,.18);
}
.v11-sidebar-item-dot {
  width: 6px; height: 6px; border-radius: 50%;
  margin-top: 6px; flex-shrink: 0;
}
.v11-sidebar-item-dot.indigo { background: #A5B4FC; }
.v11-sidebar-item-dot.cyan { background: #67E8F9; }
.v11-sidebar-item-dot.purple { background: #A78BFA; }
.v11-sidebar-item-body { flex: 1; min-width: 0; }
.v11-sidebar-item-title {
  font-size: 12.5px; color: var(--text); font-weight: 500;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  line-height: 1.35;
}
.v11-sidebar-item-meta {
  font-size: 10px; color: rgba(238,238,255,.38); margin-top: 3px;
  font-family: var(--font-m);
}

.v11-sidebar-footer {
  border-top: 1px solid rgba(255,255,255,.05);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
}
.v11-sidebar-footer-mode {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: rgba(238,238,255,.55);
}
.v11-sidebar-footer-toggle {
  width: 30px; height: 16px; border-radius: 10px;
  background: rgba(99,102,241,.25);
  position: relative; cursor: pointer;
  border: 1px solid rgba(99,102,241,.4);
  transition: background .15s;
}
.v11-sidebar-footer-toggle::after {
  content: ''; position: absolute; left: 2px; top: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #A5B4FC;
  transition: left .15s;
}
.v11-sidebar-footer-right {
  margin-left: auto;
  font-size: 10px; color: rgba(238,238,255,.38);
  font-family: var(--font-m);
}

/* ── V11 HOME SCREEN — chatbot-first ── */
.v11-home {
  min-height: calc(100vh - 56px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 40px 20px 60px;
  position: relative;
  overflow: visible;
}
.v11-home::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 800px 500px at 50% 30%, rgba(99,102,241,.06), transparent 70%);
  pointer-events: none;
}
.v11-home-kicker {
  font-family: var(--font-m); font-size: 11px; font-weight: 700;
  color: var(--slate); letter-spacing: .18em; text-transform: uppercase;
  display: flex; align-items: center; gap: 9px;
  position: relative; z-index: 1;
  margin-bottom: 24px;
}
.v11-home-kicker-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--indigo-lt, #818CF8);
  box-shadow: 0 0 6px var(--indigo-lt, #818CF8);
}
.v11-home-greeting {
  font-family: var(--font-b);
  font-size: 36px; font-weight: 700; color: var(--text);
  letter-spacing: -.02em; text-align: center;
  margin-bottom: 32px;
  max-width: 880px; line-height: 1.2;
  position: relative; z-index: 1;
}
.v11-home-greeting span { color: var(--indigo-lt, #818CF8); font-weight: 800; }
.v11-home-chat-wrap {
  width: min(720px, calc(100% - 40px));
  margin: 0 auto 14px;
  position: relative; z-index: 1;
}
/* Override Chatbot interior styling for the v11 home context */
.v11-home-chat-wrap .home-chat-wrap {
  border: none;
  background: transparent;
  box-shadow: none;
}
.v11-home-chat-wrap .sample-chips .chip { font-size: 12px; }
/* Sample-chips sit above the composer with tight spacing; the .sample-chips rule
   below already handles its own padding-bottom. No additional padding needed here. */
.v11-home-pills {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  width: min(720px, calc(100% - 40px));
  margin: 0 auto;
  position: relative; z-index: 1;
}
.v11-home-pills::before {
  display: none;
}
.v11-home-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 11px; border-radius: 7px;
  background: transparent;
  border: 1px solid rgba(99,102,241,.22);
  font-family: var(--font-b); font-size: 11px; font-weight: 600;
  color: var(--slate); cursor: pointer; transition: all .15s;
}
.v11-home-pill:hover {
  border-color: rgba(99,102,241,.45);
  background: rgba(99,102,241,.06);
  color: var(--text);
  transform: none;
}
.v11-home-pill-ico {
  display: flex; align-items: center; color: var(--slate); opacity: .7;
}
.v11-home-pill:hover .v11-home-pill-ico { color: var(--text); opacity: 1; }
.v11-home-pill.section-measurement .v11-home-pill-ico,
.v11-home-pill.section-drive .v11-home-pill-ico { color: var(--slate); }
.v11-home-pill.section-measurement:hover { border-color: rgba(99,102,241,.45); background: rgba(99,102,241,.06); }
.v11-home-pill.section-drive:hover { border-color: rgba(99,102,241,.45); background: rgba(99,102,241,.06); }

/* Landing nav pills belong to the empty state. When a chat goes active, the composer
   is the viewport footer and the pills become visual clutter floating in empty space.
   Scoped to .screen.active so that a persistent chat-wrap-active on a hidden screen
   (all screens are mounted; inactive ones are display:none) does not hide pills on the
   screen the user is actually looking at. */
.screen.active:has(.chat-wrap-active) .v11-home-pills { display: none; }
/* Masthead (kicker + greeting) collapses entirely once a conversation is engaged.
   Same screen-scoping reason as pills above. */
.landing-hero-block {
  transition: max-height .35s ease, opacity .2s ease-out, padding .3s ease, margin .3s ease;
  max-height: 600px;
  overflow: hidden;
}
.screen.active:has(.chat-wrap-active) .landing-hero-block {
  max-height: 0;
  opacity: 0;
  margin: 0;
  padding: 0 !important;
  pointer-events: none;
}

/* Screen-to-screen navigation fade. Added by nav-chip handlers before calling setScreen/onEnter.
   The body dims during the brief window between the user's click and the new screen rendering,
   so the transition reads as a deliberate chapter-turn rather than a teleport. */
html.screen-transitioning body {
  opacity: 0.25;
  transition: opacity .32s ease;
}
html:not(.screen-transitioning) body {
  transition: opacity .28s ease;
}

/* Responsive */
@media (max-width: 640px) {
  .v11-home-greeting { font-size: 26px; }
  .v11-home-pills { gap: 8px; }
  .v11-home-pill { padding: 8px 14px; font-size: 12px; }
}

/* ── SCREEN HERO ── */
/* ── GLOBAL SEPARATOR BAND (Block 2) ── */
.page-separator { height: 10px; background: var(--bg); flex-shrink: 0; }

/* ── GLOBAL HERO (Block 3 — dark navy) ── */
.hero {
  padding: 16px 40px 12px;
  background: linear-gradient(135deg, var(--navy) 0%, #162D4F 100%);
  color: #fff;
  position: relative;
  overflow: visible;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid rgba(0,180,230,0.35); background: rgba(0,180,230,0.1);
  font-size: 11px; font-weight: 700; color: var(--cyan);
  letter-spacing: .1em; text-transform: uppercase; margin-bottom: 0;
}
/* v11.2 — radical minimal: eyebrow-only headers. H1 and paragraph are killed on all section heroes. */
.hero h1, .hero p { display: none; }
/* v11.3 Apr 18 — Partners rename · kill landing eyebrows, keep in-tab breadcrumbs only.
   .hero-eyebrow-nav (with back-arrow) functions as breadcrumb when inside a tab — kept.
   Plain .hero-eyebrow (static section label on landing pages) hidden — the rail icon
   and chat placeholder already convey section context. */
.hero-eyebrow:not(.hero-eyebrow-nav) { display: none; }
/* v11.4 Apr 18 PM — kill in-tab breadcrumbs too. Production pattern: role-gated users
   never leave their section, so back-nav is redundant. Rail icon = you-are-here indicator. */
.hero-eyebrow-nav { display: none; }
/* Collapse the now-empty .hero wrapper — all internal content (eyebrow, h1, p) is hidden. */
.hero { padding: 0 !important; min-height: 0 !important; border: none !important; }

/* ── CARDS & PANELS ── */
.panel {
  background: var(--card);
  border: 1px solid rgba(99,102,241,.28);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.panel-hdr {
  padding: 14px 18px;
  border-bottom: 1px solid var(--bdr);
  background: var(--card-alt);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-size: 14px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--text); }
.badge {
  font-size: 11px; padding: 3px 9px; border-radius: 12px; border: 1px solid; white-space: nowrap;
}
.badge-live  { color: var(--green); border-color: rgba(5,150,105,.3); background: rgba(5,150,105,.08); }
.badge-cyan  { color: var(--cyan-dim);  border-color: rgba(0,180,230,.3); background: rgba(0,180,230,.08); }
.badge-amber { color: var(--amber); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); animation: blink 1.4s ease infinite; }
.badge-mod   { color: var(--amber); border-color: rgba(217,119,6,.3); background: rgba(217,119,6,.08); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.badge-pass  { color: var(--green); border-color: rgba(5,150,105,.3); background: rgba(5,150,105,.08); }

/* ── CHATBOT ── */
.chat-wrap { display: flex; flex-direction: column; flex: 1; min-height: 0; }

/* EMPTY STATE — sample prompts above, composer shell, Jump-to pills sit OUTSIDE chatbot
   (rendered by HomeScreen / section landings as .v11-home-pills directly under composer) */
.chat-wrap-empty { justify-content: center; }
.chat-wrap-empty .chat-messages { display: none; }
.chat-wrap-empty .sample-chips { order: 1; margin-bottom: 10px; }
.chat-wrap-empty .chat-shell { order: 2; }

/* ACTIVE STATE — sample chips hidden, composer shell pins as viewport footer (claude.ai) */
.chat-wrap-active .chat-messages { order: 1; flex: 0 0 auto; overflow: visible; min-height: 0; padding-bottom: 160px; }
.chat-wrap-active .sample-chips { display: none; }

/* When a chatbot sits inside a stretched card alongside cards of known height
   (audiences library, etc.), the ".chat-wrap-empty { justify-content: center }"
   default floats the composer in the middle with equal top/bottom padding.
   This override anchors the sample-chips + composer to the bottom so the
   bottom inset matches the adjacent cards' ~14px card padding. */
.chat-in-card-stretched .chat-wrap-empty { justify-content: flex-end; padding-bottom: 4px; }
/* Card-embedded chats must never go fixed — override the viewport-footer position */
.chat-in-card-stretched .chat-shell { position: static !important; transform: none !important; width: 100% !important; bottom: auto !important; left: auto !important; z-index: auto !important; }
.chat-in-card-stretched .chat-wrap-active .chat-messages { padding-bottom: 0 !important; }
.chat-wrap-active .chat-shell {
  order: 2;
  position: fixed;
  bottom: 20px;
  left: 52px;
  right: 0;
  margin: 0 auto;
  transform: none;
  width: min(720px, calc(100vw - 52px - 40px));
  z-index: 20;
  background: rgba(14,14,34,.95);
  backdrop-filter: blur(14px);
  box-shadow: 0 12px 32px rgba(0,0,0,.4);
}

.chat-messages {
  flex: 1 1 auto; overflow-y: auto; padding: 14px 20px;
  display: flex; flex-direction: column; gap: 16px;
  background: transparent; min-height: 0;
}
.chat-messages:empty { padding: 0; }
.chat-empty { color: var(--slate); font-size: 16px; text-align: center; padding-top: 40px; line-height: 1.8; }
.chat-empty .hint { font-size: 13px; color: var(--text-sec); margin-top: 10px; display: block; }
.chat-empty .hint-cyan { font-size: 13px; color: var(--cyan-dim); font-weight: 500; margin-top: 8px; display: block; }

.msg { display: flex; gap: 12px; margin-bottom: 6px; animation: msg-fade-in .28s cubic-bezier(.4,0,.2,1) both; }
@keyframes msg-fade-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes typing-bounce {
  0%,60%,100% { transform: translateY(0); opacity:.4; }
  30% { transform: translateY(-5px); opacity:1; }
}
.msg.user { justify-content: flex-end; }
.msg.user .bubble {
  background: var(--cyan); border: none;
  color: #FFFFFF; font-size: 15px; padding: 12px 17px; line-height: 1.68;
  border-radius: 16px 16px 4px 16px; max-width: 78%;
}
.msg.assistant .bubble { flex: 1; font-size: 15px; line-height: 1.7; color: var(--text); background: transparent; padding: 4px 0; border-radius: 0; border: none; box-shadow: none; }

/* ─── Sample-prompt row (Option C · top row) ───
   Quiet, bordered, tappable. Same visual weight as the bottom nav row.
   Small "Try asking" label handled inline in JSX via ::before */
.sample-chips {
  padding: 0 0 10px;
  display: flex; gap: 6px; flex-wrap: wrap;
  background: transparent; flex-shrink: 0;
  position: relative;
}
.sample-chips::before {
  content: "Try asking";
  display: block;
  font-family: var(--font-m);
  font-size: 9.5px;
  color: var(--slate);
  opacity: .55;
  letter-spacing: .08em;
  text-transform: uppercase;
  width: 100%;
  margin-bottom: 2px;
}
.chip {
  padding: 7px 12px;
  background: var(--card-alt);
  border: 1px solid rgba(99,102,241,.22);
  border-radius: 7px;
  font-size: 12px;
  color: var(--slate);
  cursor: pointer;
  transition: all .15s;
  font-family: var(--font-b);
}
.chip:hover {
  color: var(--text);
  border-color: rgba(99,102,241,.45);
  background: rgba(99,102,241,.14);
}
.explore-link-btn { flex-shrink: 0; background: none; border: none; color: var(--cyan); font-size: 12px; font-weight: 700; cursor: pointer; padding: 4px 0; letter-spacing: .02em; opacity: .85; transition: opacity .15s; }
.explore-link-btn:hover { opacity: 1; text-decoration: underline; }

/* Legacy .chat-footer selector removed — bar is now .chat-bar INSIDE .chat-shell */
/* Unified composer shell — textarea + bar render as ONE integrated box (claude.ai pattern) */
.chat-shell {
  background: #0C0C1E;
  border: 1px solid rgba(99,102,241,.2);
  border-radius: 10px;
  display: flex; flex-direction: column;
  transition: border-color .15s;
}
.chat-shell:focus-within {
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}
.chat-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: transparent;
  border-top: 1px solid rgba(99,102,241,.12);
}
.chat-input {
  margin: 0; background: transparent; border: none;
  padding: 14px 16px 10px;
  color: var(--text);
  font-family: var(--font-b); font-size: 15px; resize: none; outline: none;
  min-height: 56px; max-height: 160px; line-height: 1.5;
  width: 100%;
  box-sizing: border-box;
}
.chat-input::placeholder { color: #94A3B8; }

/* ─── Single + button (replaces paperclip + Drive) ─── */
.chat-plus-wrap { position: relative; display: flex; }
.chat-plus-btn {
  width: 32px; height: 32px; background: transparent;
  border: 1px solid rgba(99,102,241,.2); border-radius: 7px;
  cursor: pointer; color: var(--slate);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .12s; padding: 0;
}
.chat-plus-btn:hover {
  background: rgba(99,102,241,.1); color: var(--cyan-pale);
  border-color: rgba(99,102,241,.4);
}
.chat-plus-popover {
  position: absolute; bottom: calc(100% + 8px); left: 0;
  width: 260px;
  background: var(--card); border: 1px solid rgba(99,102,241,.35);
  border-radius: 8px; padding: 6px;
  box-shadow: 0 12px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(99,102,241,.08);
  z-index: 50;
  display: flex; flex-direction: column; gap: 1px;
}
.chat-plus-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; background: transparent; border: none;
  border-radius: 5px; cursor: pointer;
  font-family: var(--font-b); font-size: 12px;
  color: var(--text); text-align: left; width: 100%;
  transition: background .12s;
}
.chat-plus-item:hover { background: rgba(99,102,241,.1); }
.chat-plus-item.disabled {
  opacity: .42; cursor: not-allowed;
}
.chat-plus-item.disabled:hover { background: transparent; }
.chat-plus-label { flex: 1; color: var(--text); }
.chat-plus-item.disabled .chat-plus-label { color: var(--slate); }
.chat-plus-sub {
  font-family: var(--font-m); font-size: 9px;
  color: var(--slate); opacity: .6;
  letter-spacing: .08em; text-transform: uppercase;
  margin-left: auto;
}
.chat-plus-divider {
  height: 1px; background: rgba(99,102,241,.18);
  margin: 4px 6px;
}

/* Legacy class kept as alias for any stray references */
.chat-icon-btn {
  width: 32px; height: 32px; background: transparent; border: 1px solid rgba(99,102,241,.2);
  border-radius: 7px; cursor: pointer; color: var(--slate);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .12s;
}
.chat-icon-btn:hover { background: rgba(99,102,241,.1); color: var(--cyan-pale); border-color: rgba(99,102,241,.4); }
.chat-model-pill {
  height: 32px; font-size: 11px; color: var(--slate); padding: 0 10px;
  border: 1px solid rgba(99,102,241,.2); border-radius: 7px;
  font-family: var(--font-m); display: flex; align-items: center; gap: 5px;
  cursor: pointer; flex-shrink: 0;
}
.send-btn {
  width: 32px; height: 32px; background: var(--cyan); color: #FFFFFF;
  border: none; border-radius: 7px; font-family: var(--font-b);
  cursor: pointer; transition: all .15s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { background: #5254E8; }
.send-btn:disabled { opacity: .4; cursor: not-allowed; }
.send-btn svg { width: 14px; height: 14px; }

/* Typing dots */
.typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
.typing-dot { width: 6px; height: 6px; background: #94A3B8; border-radius: 50%; animation: bounce 1.2s ease infinite; }
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

/* Result card */
.result-card {
  background: var(--card); border: 1px solid rgba(99,102,241,.32);
  border-radius: 10px; overflow: hidden; margin-top: 4px;
  box-shadow: var(--shadow);
}
.result-card-hdr {
  padding: 14px 18px; border-bottom: 1px solid var(--bdr);
  background: var(--card-alt);
  display: flex; align-items: center; justify-content: space-between;
}
.result-card-title { font-size: 15px; font-weight: 600; color: var(--text); }
.result-num { font-family: var(--font-d); font-size: 24px; font-weight: 800; color: var(--cyan); }
.result-card-body { padding: 16px 18px; }
.shap-row { margin-bottom: 9px; }
.shap-lbl { display: flex; justify-content: space-between; font-size: 13px; color: var(--slate); margin-bottom: 4px; }
.shap-track { height: 5px; background: #E2E8F0; border-radius: 3px; }
.shap-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--cyan), var(--green)); }
.comp-row { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 0 4px; }
.comp-pass { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; padding: 4px 10px; border-radius: 14px; color: var(--green); border: 1px solid rgba(5,150,105,.3); background: rgba(5,150,105,.07); }

/* Journey cards */
.journey-path {
  display: flex; align-items: center; overflow-x: auto;
  padding: 18px 18px; gap: 0;
}
.j-node { display: flex; flex-direction: column; align-items: center; gap: 7px; min-width: 90px; flex-shrink: 0; }
.j-circle {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; border: 2px solid var(--bdr); background: var(--card-alt);
}
.j-circle.primary { border-color: var(--cyan); background: rgba(0,180,230,.1); }
.j-lbl { font-size: 13px; color: var(--slate); text-align: center; }
.j-kpi { font-size: 13px; font-weight: 600; color: var(--text); }
.j-day { font-size: 12px; color: var(--text-sec); }
.j-arrow { font-size: 18px; color: #CBD5E1; flex-shrink: 0; padding-bottom: 22px; margin: 0 3px; }

/* ── IDENTITY GRAPH SCREEN ── */
.ig-layout { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; padding: 8px 28px 16px; align-items: stretch; }
/* Identity page — kill hero chrome entirely so page is zero-scroll */
div:has(> .ig-layout) > .hero { display: none; }
.ig-graph-panel { position: relative; display: flex; flex-direction: column; height: 100%; }
#ig-canvas { width: 100%; height: 100%; min-height: 460px; background: var(--navy); box-sizing: border-box; overflow: visible; border-radius: var(--r); border: 1px solid var(--bdr); box-shadow: var(--shadow); }
.ig-legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 12px 16px; border-top: 1px solid var(--bdr); font-size: 13px; background: var(--card-alt); color: var(--slate); }
.ig-layout > div:first-child { display: flex; flex-direction: column; }
.ig-layout > div:first-child .panel { flex: 1; display: flex; flex-direction: column; }
.ig-layout > div:first-child .panel > div.ig-canvas-wrap,
.ig-layout > div:first-child .panel > div:has(#ig-canvas) { flex: 1; }
.ig-legend-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }

.ig-profile { display: flex; flex-direction: column; gap: 14px; }
.profile-card {
  background: var(--card); border: 1px solid var(--bdr);
  border-radius: var(--r); overflow: hidden;
  box-shadow: var(--shadow);
}
.profile-hdr {
  padding: 14px 18px;
  background: linear-gradient(135deg, rgba(0,180,230,.07), rgba(5,150,105,.04));
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--bdr);
}
.avatar {
  width: 50px; height: 50px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-d); font-size: 20px; font-weight: 800; color: var(--text);
  flex-shrink: 0;
}
.profile-name { font-size: 17px; font-weight: 600; color: var(--text); }
.profile-id { font-family: var(--font-m); font-size: 12px; color: var(--slate); margin-top: 2px; }
.profile-segment { font-size: 13px; color: var(--cyan-dim); font-weight: 500; }
.profile-signals { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding: 14px 16px; }
.sig { background: var(--bg); border: 1px solid var(--bdr); border-radius: 8px; padding: 10px 13px; }
.sig-lbl { font-size: 13px; color: var(--text-sec); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.sig-val { font-size: 16px; font-weight: 600; color: var(--text); }
.intent-section { padding: 14px 16px; border-top: 1px solid var(--bdr); }
.intent-title { font-size: 13px; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
.intent-row { margin-bottom: 9px; }
.intent-lbl { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; color: var(--slate); }
.intent-track { height: 5px; background: #E2E8F0; border-radius: 3px; overflow: hidden; }
.intent-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
.compliance-badges { display: flex; flex-wrap: wrap; gap: 7px; padding: 12px 16px; border-top: 1px solid var(--bdr); }

.ig-click-hint {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(14,31,56,.85); border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 6px 14px; font-size: 13px; color: rgba(255,255,255,.8);
  pointer-events: none; transition: opacity .5s;
}

/* ── IDENTITY SEARCH (Phase 3.5) ── */
.ig-search-wrap {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--bdr);
}
.ig-search-row {
  display: flex; align-items: center; gap: 10px;
  background: rgba(9,9,26,.55);
  border: 1px solid rgba(99,102,241,.22);
  border-radius: 10px;
  padding: 10px 14px;
  transition: border-color .15s, box-shadow .15s;
}
.ig-search-row:focus-within {
  border-color: rgba(99,102,241,.55);
  box-shadow: 0 0 0 3px rgba(99,102,241,.1);
}
.ig-search-row.fmt-valid {
  border-color: rgba(6,182,212,.5);
  box-shadow: 0 0 0 3px rgba(6,182,212,.08);
}
.ig-search-row.fmt-weak {
  border-color: rgba(245,158,11,.4);
}
.ig-search-row.fmt-unknown {
  border-color: rgba(148,163,184,.25);
}
.ig-search-icon {
  color: var(--slate-lt); flex-shrink: 0;
  transition: color .15s;
}
.ig-search-row:focus-within .ig-search-icon,
.ig-search-row.fmt-valid .ig-search-icon { color: var(--cyan-dim); }
.ig-search-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: var(--font-b); font-size: 13px; color: var(--text); font-weight: 500;
}
.ig-search-input::placeholder { color: var(--slate-lt); }
.ig-search-input::-webkit-search-cancel-button { display: none; }
.ig-search-chip {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; font-family: var(--font-m);
  padding: 3px 9px; border-radius: 6px; white-space: nowrap; flex-shrink: 0;
  letter-spacing: .04em;
}
.ig-chip-valid {
  background: rgba(6,182,212,.14); color: #67E8F9;
  border: 1px solid rgba(6,182,212,.3);
}
.ig-chip-weak {
  background: rgba(245,158,11,.12); color: var(--amber);
  border: 1px solid rgba(245,158,11,.3);
}
.ig-chip-unknown {
  background: rgba(148,163,184,.1); color: var(--slate);
  border: 1px solid rgba(148,163,184,.2);
}
.ig-chip-kbd {
  background: rgba(99,102,241,.12); color: var(--cyan-dim);
  border: 1px solid rgba(99,102,241,.25);
}
.ig-search-hints {
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-left: 4px;
  align-items: center;
}
.ig-search-hints-lbl {
  font-size: 9px; font-weight: 700; color: var(--slate-lt);
  text-transform: uppercase; letter-spacing: .1em; font-family: var(--font-m);
  margin-right: 4px;
}
.ig-search-format {
  font-size: 10px; font-weight: 600; font-family: var(--font-m);
  padding: 3px 8px; border-radius: 5px;
  background: rgba(99,102,241,.05);
  border: 1px solid rgba(99,102,241,.12);

}
.ig-search-format.active {
  background: rgba(6,182,212,.1);
  border-color: rgba(6,182,212,.28);
  color: #67E8F9;
}

/* Unit C — additional chip variants */
.ig-chip-suppressed {
  background: rgba(248,113,113,.12); color: #FCA5A5;
  border: 1px solid rgba(248,113,113,.3);
}
.ig-search-row.fmt-no-match,
.ig-search-row.fmt-candidates {
  border-color: rgba(245,158,11,.4);
}
.ig-search-row.fmt-suppressed {
  border-color: rgba(248,113,113,.45);
}

/* Unit C — Result panel (renders below search row when resultState is candidates / no-match / suppressed) */
.ig-result-panel {
  margin-top: 12px;
  background: rgba(9,9,26,.45);
  border: 1px solid rgba(99,102,241,.18);
  border-radius: 10px;
  padding: 14px;
  animation: ig-fade-in .18s ease;
}
@keyframes ig-fade-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.ig-result-panel.no-match { border-color: rgba(245,158,11,.22); background: rgba(245,158,11,.03); }
.ig-result-panel.suppressed { border-color: rgba(248,113,113,.22); background: rgba(248,113,113,.03); }

.ig-result-hdr {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.ig-result-ico {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(99,102,241,.1); color: var(--cyan-dim);

}
.ig-result-ico.amber { background: rgba(245,158,11,.1); color: var(--amber); }
.ig-result-ico.red { background: rgba(248,113,113,.1); color: #F87171; }
.ig-result-title { font-size: 13px; font-weight: 700; color: var(--text); }
.ig-result-sub { font-size: 11px; color: var(--slate); font-family: var(--font-m); margin-top: 2px; }

/* Candidates list */
.ig-cand-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.ig-cand-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 11px; border-radius: 8px;
  background: rgba(14,14,32,.6);
  border: 1px solid rgba(245,158,11,.14);
  cursor: pointer;
  transition: all .15s;
}
.ig-cand-row:hover { border-color: rgba(245,158,11,.45); background: rgba(245,158,11,.05); }
.ig-cand-row.top { border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.06); }
.ig-cand-chip {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--amber), #FCD34D);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; color: #fff; font-family: var(--font-m); flex-shrink: 0;
}
.ig-cand-id { font-size: 12px; font-weight: 700; color: var(--text); font-family: var(--font-m); flex: 1; }
.ig-cand-seg { color: var(--slate); font-weight: 500; font-size: 10px; margin-left: 6px; }
.ig-cand-conf { font-size: 11px; color: var(--amber); font-weight: 700; font-family: var(--font-m); }

/* No-match watchlist */
.ig-nomatch-body {
  text-align: center; padding: 10px 8px 4px;
}
.ig-nomatch-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.ig-nomatch-sub { font-size: 10px; color: var(--slate); font-family: var(--font-m); margin-bottom: 12px; line-height: 1.55; }
.ig-nomatch-sub b { color: var(--text); font-weight: 700; }
.ig-watchlist-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 7px;
  background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.4);
  color: var(--cyan-dim);
  font-size: 11px; font-weight: 700; cursor: pointer;
  font-family: var(--font-b);
  transition: all .15s;
}
.ig-watchlist-btn:hover { background: rgba(99,102,241,.25); border-color: rgba(99,102,241,.6); }
.ig-watchlist-note { margin-top: 10px; font-size: 10px; color: var(--slate-lt); font-family: var(--font-m); line-height: 1.5; }
.ig-watchlist-count {
  margin-top: 10px; padding: 6px 10px;
  background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2);
  border-radius: 6px;
  font-size: 10px; font-family: var(--font-m); color: var(--cyan-dim); font-weight: 600;
  text-align: center;
}

/* Suppressed state */
.ig-sup-note {
  display: flex; gap: 9px; align-items: flex-start;
  padding: 10px 12px; background: rgba(248,113,113,.05);
  border: 1px solid rgba(248,113,113,.2); border-radius: 8px;
  margin-top: 2px;
}
.ig-sup-note-icon { color: #F87171; flex-shrink: 0; margin-top: 1px; }
.ig-sup-note-t { font-size: 11px; color: var(--text); font-weight: 700; margin-bottom: 3px; }
.ig-sup-note-s { font-size: 10px; color: var(--slate); line-height: 1.55; }
.ig-sup-footer {
  margin-top: 10px; font-size: 9px; color: var(--slate-lt);
  font-family: var(--font-m); text-align: center; letter-spacing: .08em;
  text-transform: uppercase;
}

/* Unit D — Watchlist peek badge (persistent indicator in search row) */
.ig-watchlist-peek {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 700; font-family: var(--font-m);
  padding: 3px 8px; border-radius: 5px;
  background: rgba(99,102,241,.08);
  border: 1px solid rgba(99,102,241,.22);
  color: var(--cyan-dim);
  cursor: default;
  letter-spacing: .04em;
}
.ig-watchlist-peek::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan-dim);
  box-shadow: 0 0 4px var(--cyan-dim);
}

/* Unit D — candidate keyboard focus ring */
.ig-cand-row:focus-visible,
.ig-cand-row.kb-focused {
  outline: none;
  border-color: rgba(245,158,11,.7);
  box-shadow: 0 0 0 2px rgba(245,158,11,.25);
}
.ig-cand-row {
  outline: none;
}

/* Unit D — responsive (narrow viewports / mobile) */
@media (max-width: 768px) {
  .ig-search-row { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
  .ig-search-input { min-width: 0; font-size: 13px; }
  .ig-search-chip { order: 3; }
  .ig-search-hints { gap: 4px; }
  .ig-search-format { font-size: 9px; padding: 2px 6px; }
  .ig-search-hints-lbl { display: none; }
  .ig-cand-row { padding: 10px 11px; }
  .ig-cand-id { font-size: 11px; }
  .ig-cand-seg { display: block; margin-left: 0; margin-top: 1px; }
}

/* ── FLIGHT DECK SCREEN ── */
.desk-wrap { display: flex; flex: 1; min-height: 0; overflow: hidden; flex-direction: column; }
.desk-sidebar { display: none; }
.desk-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: var(--bg); }
.desk-item {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 13px; border-radius: 9px;
  cursor: pointer; transition: all .15s; margin-bottom: 3px;
  border: 1px solid transparent;
}
.desk-item:hover { background: rgba(255,255,255,.07); }
.desk-item.active { background: rgba(0,180,230,.18); border-color: rgba(0,180,230,.35); }

/* "Back to hub" sidebar entry — distinct styling from regular sub-nav */
.desk-home-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 13px; border-radius: 9px; cursor: pointer;
  margin-bottom: 8px; transition: all .15s;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.02);
}
.desk-home-item:hover { background: rgba(99,102,241,.12); border-color: rgba(99,102,241,.3); }
.desk-home-item-lbl { font-size: 12px; font-weight: 600; color: rgba(238,238,255,.65); letter-spacing: .01em; }
.desk-home-item:hover .desk-home-item-lbl { color: #EEEEFF; }
.desk-home-item-chevron { color: rgba(238,238,255,.4); flex-shrink: 0; transition: color .15s, transform .15s; }
.desk-home-item:hover .desk-home-item-chevron { color: var(--cyan-dim); transform: translateX(-2px); }

/* Clickable eyebrow that acts as a breadcrumb back to hub */
.hero-eyebrow-nav { cursor: pointer; transition: color .15s, border-color .15s; }
.hero-eyebrow-nav:hover { color: var(--cyan) !important; border-color: var(--cyan) !important; }
.hero-eyebrow-nav::before { content: '← '; opacity: .7; margin-right: 2px; font-weight: 700; }
.desk-icon { font-size: 18px; flex-shrink: 0; }
.desk-lbl { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6); line-height: 1.3; }
.desk-item.active .desk-lbl { color: #FFFFFF; }
.desk-nbadge { margin-left: auto; font-size: 11px; padding: 2px 7px; border-radius: 9px; background: rgba(0,180,230,.2); color: var(--cyan); border: 1px solid rgba(0,180,230,.3); }

.desk-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; background: var(--bg); }
.desk-cap { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.desk-cap.active { display: flex; }
.desk-cap.active.three-col {
  display: flex !important;
  flex-direction: row !important;
  overflow: hidden !important;
}
.three-col-mid { display: flex; flex-direction: column; overflow: hidden; min-height: 0; padding: 0; gap: 0; border-right: 1px solid var(--bdr); background: var(--bg); }
.three-col-mid {
  flex: 0 0 66% !important;
  order: 1 !important;
  display: flex !important;
  flex-direction: column !important;
  overflow: hidden !important;
  border-right: 1px solid var(--bdr) !important;
}
.three-col-right { overflow-y: auto; min-height: 0; background: var(--card-alt); }
.three-col-right {
  flex: 0 0 34% !important;
  order: 2 !important;
  display: flex !important;
  flex-direction: column !important;
  overflow-y: auto !important;
  background: var(--card-alt) !important;
  min-width: 0 !important;
}
.three-col-mid .home-chat-wrap { flex: 1; min-height: 0; }

/* Elevated chat panel */
.three-col-mid .chat-wrap { flex: 1; min-height: 0; display: flex; flex-direction: column; background: var(--bg); }
.chat-agent-header { padding: 14px 20px 10px; border-bottom: 1px solid var(--bdr); display: flex; align-items: center; gap: 10px; background: rgba(22,22,58,.9); }
.chat-agent-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.chat-agent-name { font-size: 13px; font-weight: 700; color: var(--text); }
.chat-agent-tag { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 5px; background: rgba(0,180,230,.1); color: var(--cyan-dim); letter-spacing: .05em; text-transform: uppercase; margin-left: auto; }
.chat-prompts-wrap { padding: 18px 20px 14px; display: flex; flex-direction: column; gap: 9px; }
.chat-prompt-label { font-size: 12px; font-weight: 600; color: var(--slate); margin-bottom: 2px; text-transform: uppercase; letter-spacing: .06em; }
.chat-prompt-btn { text-align: left; background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.3); border-left: 3px solid var(--cyan); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--tevy); cursor: pointer; line-height: 1.45; transition: background .12s, border-color .12s; font-family: inherit; }
.chat-prompt-btn:hover { background: rgba(0,180,230,.04); border-left-color: var(--cyan-dim); }
.chat-input-wrap { padding: 10px 16px 14px; border-top: 1px solid rgba(99,102,241,.3); display: flex; gap: 8px; align-items: flex-end; background: rgba(22,22,58,.9); }
.chat-textarea { flex: 1; padding: 11px 14px; border-radius: 9px; border: 1px solid var(--bdr); font-size: 15px; color: var(--text); background: var(--bg); outline: none; resize: none; min-height: 48px; max-height: 140px; line-height: 1.6; font-family: inherit; }
.chat-textarea:focus { border-color: var(--cyan); }
.chat-send-btn { width: 40px; height: 40px; border-radius: 9px; background: var(--cyan); color: #fff; border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .12s; }
.chat-send-btn:hover { opacity: .85; }
.chat-send-btn:disabled { opacity: .45; cursor: not-allowed; }

/* Creative cards */
.creative-grid { display: flex; flex-direction: column; gap: 12px; padding: 20px 24px; overflow-y: auto; }
.creative-card {
  background: var(--card); border: 2px solid rgba(99,102,241,.3);
  border-radius: var(--r); padding: 16px 18px; cursor: pointer;
  transition: all .2s ease; box-shadow: var(--shadow);
}
.creative-card:hover { border-color: var(--cyan); box-shadow: 0 4px 16px rgba(0,180,230,.12); }

.creative-card-hdr { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.creative-name { font-size: 16px; font-weight: 600; color: var(--text); }
.creative-format { font-size: 13px; color: var(--slate); margin-top: 3px; }
.creative-ctr { font-family: var(--font-d); font-size: 22px; font-weight: 800; color: var(--cyan); }
.creative-ctr-lbl { font-size: 12px; color: var(--slate); }
.creative-badges { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
.creative-selected-banner {
  padding: 8px 14px; background: rgba(0,180,230,.08); border-top: 1px solid rgba(0,180,230,.2);
  font-size: 13px; color: var(--cyan-dim); font-weight: 500;
  display: flex; align-items: center; gap: 6px;
}

/* Orchestration board */
.orch-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; padding: 20px 24px; overflow-y: auto; }
.orch-card {
  background: var(--card); border: 1px solid var(--bdr);

  box-shadow: var(--shadow); min-width: 0;
}
.orch-card.running { border-color: var(--cyan); box-shadow: 0 4px 16px rgba(0,180,230,.12); }
.orch-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
.orch-name { font-size: 14px; font-weight: 600; color: var(--text); }
.orch-stat { font-size: 13px; color: var(--slate); margin-bottom: 5px; }
.orch-stat strong { color: var(--text); }
.orch-bar { height: 4px; background: #E2E8F0; border-radius: 2px; overflow: hidden; margin-top: 10px; }
.orch-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--cyan), var(--green)); transition: width .8s ease; }

/* Summary */
.brief-doc { margin: 20px 24px; background: var(--card); border: 1px solid var(--bdr); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; max-height: calc(100% - 40px); }
.brief-doc-body { flex: 1; overflow-y: auto; }
.brief-doc-hdr { padding: 16px 22px; border-bottom: 1px solid var(--bdr); background: var(--card-alt); display: flex; align-items: center; justify-content: space-between; }
.brief-doc-title { font-size: 17px; font-weight: 600; color: var(--text); }
.brief-btns { display: flex; gap: 9px; }
.btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; border: 1px solid; }
.btn-primary { background: var(--navy); color: #FFFFFF; border-color: var(--text); }
.btn-primary:hover { background: #1E3D6B; }
.btn-secondary { background: transparent; color: var(--slate); border-color: var(--bdr); }
.btn-secondary:hover { color: var(--text); border-color: var(--bdr-strong); background: var(--card-alt); }
.brief-section { padding: 14px 22px; border-bottom: 1px solid var(--bdr); }
.brief-section:last-child { border-bottom: none; }
.brief-section-lbl { font-size: 12px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--cyan-dim); margin-bottom: 7px; }
.brief-section-val { font-size: 15px; color: var(--slate); line-height: 1.6; }
.brief-section-val strong { color: var(--text); }

/* ── MEASUREMENT ZONE SCREEN ── */
.mz-layout { display: grid; grid-template-columns: 3fr 2fr; grid-template-rows: auto auto; gap: 20px; padding: 24px 28px; }
.mz-main { grid-column: 1; grid-row: 1 / span 2; display: grid; grid-template-rows: subgrid; gap: 16px; }
.mz-sidebar { grid-column: 2; grid-row: 1 / span 2; display: grid; grid-template-rows: subgrid; gap: 14px; }
.mz-main > *, .mz-sidebar > * { min-height: 0; }
.mz-attr-panel { grid-column: 1; grid-row: 2; }
.mz-chat-panel { grid-column: 2; grid-row: 2; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.bubble-panel { position: relative; }
#mz-svg { width: 100%; height: 440px; background: var(--card); border-radius: var(--r); border: 1px solid var(--bdr); box-shadow: var(--shadow); }

.cohort-tooltip {
  position: absolute; pointer-events: none;
  background: rgba(14,31,56,.97); border: 1px solid rgba(255,255,255,.15);
  border-radius: 10px; padding: 14px 16px; min-width: 220px;
  box-shadow: var(--shadow-lg); z-index: 50;
  transition: opacity .2s;
}
.cohort-tooltip h4 { font-size: 15px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; }
.cohort-tooltip .tt-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
.cohort-tooltip .tt-key { color: rgba(255,255,255,0.6); }
.cohort-tooltip .tt-val { color: #FFFFFF; font-weight: 600; }
.cohort-tooltip .tt-traits { margin-top: 9px; padding-top: 9px; border-top: 1px solid rgba(255,255,255,.15); }
.cohort-tooltip .tt-trait { font-size: 12px; color: var(--cyan); padding: 2px 0; }

.mz-table { background: var(--card); border: 1px solid var(--bdr); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
.mz-table table { width: 100%; border-collapse: collapse; }
.mz-table th { padding: 12px 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text); border-bottom: 1px solid var(--bdr); text-align: left; background: var(--card-alt); }
.mz-table td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid rgba(99,102,241,.15); color: var(--text); }
.mz-table tr:last-child td { border-bottom: none; }
.mz-table tr:hover td { background: rgba(0,180,230,.03); }

.cohort-detail {
  background: var(--card); border: 1px solid var(--bdr);
  border-radius: var(--r); overflow: hidden;
  box-shadow: var(--shadow);
}
.cohort-detail-hdr {
  padding: 13px 16px; border-bottom: 1px solid var(--bdr);
  background: var(--card-alt);
  display: flex; align-items: center; gap: 10px;
}
.cohort-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.cohort-detail-name { font-size: 15px; font-weight: 700; color: var(--text); }
.cohort-detail-body { padding: 14px 16px; }
.cohort-stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.cohort-stat-key { font-size: 13px; color: var(--slate); }
.cohort-stat-val { font-size: 14px; font-weight: 600; color: var(--text); }
.cohort-traits { margin-top: 10px; }
.cohort-trait { font-size: 13px; color: var(--slate); padding: 4px 0; border-bottom: 1px solid rgba(99,102,241,.15); display: flex; align-items: center; gap: 6px; }
.cohort-trait:last-child { border-bottom: none; }
.trait-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── CMN SCREEN ── */
.cmn-inner-tabs { display: flex; gap: 0; padding: 16px 28px 0; border-bottom: 1px solid var(--bdr); background: var(--card); }
.cmn-tab {
  padding: 10px 22px; font-size: 15px; font-weight: 500;
  color: var(--slate); cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .15s; margin-bottom: -1px;
}
.cmn-tab:hover { color: var(--text); }
.cmn-tab.active { color: var(--cyan-dim); border-bottom-color: var(--cyan); font-weight: 600; }

.cmn-pane { display: none; }
.cmn-pane.active { display: block; }

/* CMN Start pane */
.cmn-start-layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 24px 28px; }
.merchant-card { background: var(--card); border: 1px solid rgba(99,102,241,.32); border-radius: var(--r); padding: 20px; box-shadow: var(--shadow); }
.merchant-logo-big { width: 56px; height: 62px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: linear-gradient(135deg, rgba(0,180,230,.12), rgba(5,150,105,.08)); margin-bottom: 14px; border: 1px solid var(--bdr); }
.merchant-name { font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.merchant-type { font-size: 14px; color: var(--slate); margin-bottom: 16px; }
.merchant-stat-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--bdr); }
.merchant-stat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.mst-key { color: var(--slate); }
.mst-val { font-weight: 600; color: var(--text); }

/* CMN Build pane */
.cmn-build-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 24px 28px; }
.targeting-panel { background: var(--card); border: 1px solid var(--bdr); border-radius: var(--r); overflow: hidden; box-shadow: var(--shadow); }
.targeting-hdr { padding: 14px 18px; border-bottom: 1px solid var(--bdr); background: var(--card-alt); }
.targeting-title { font-size: 15px; font-weight: 600; color: var(--text); }
.targeting-options { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.targeting-opt {
  padding: 12px 14px; background: var(--bg); border: 1px solid var(--bdr);
  border-radius: 9px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 11px;
}
.targeting-opt:hover { border-color: var(--cyan); background: rgba(0,180,230,.04); }
.targeting-opt.selected { border-color: var(--cyan); background: rgba(0,180,230,.06); box-shadow: 0 2px 8px rgba(0,180,230,.1); }
.targeting-opt-icon { font-size: 20px; flex-shrink: 0; }
.targeting-opt-text { flex: 1; }
.targeting-opt-name { font-size: 14px; font-weight: 600; color: var(--text); }
.targeting-opt-desc { font-size: 12px; color: var(--slate); margin-top: 2px; }
.targeting-opt-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--bdr); display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all .15s; flex-shrink: 0; }
.targeting-opt.selected .targeting-opt-check { background: var(--cyan); border-color: var(--cyan); color: var(--text); }

/* CMN Results pane */
.cmn-results-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 24px 28px; }
.results-full { grid-column: 1 / -1; }
.perf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.perf-tile { background: var(--card); border: 1px solid var(--bdr); border-radius: var(--r); padding: 16px 18px; box-shadow: var(--shadow); }
.perf-val { font-family: var(--font-d); font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.perf-lbl { font-size: 13px; color: var(--slate); }
.perf-note { padding: 13px 16px; background: rgba(5,150,105,.05); border: 1px solid rgba(5,150,105,.2); border-radius: 9px; font-size: 14px; color: var(--slate); line-height: 1.6; }
.perf-note strong { color: var(--green); }

#dma-svg { width: 100%; height: 300px; background: var(--card); border-radius: var(--r); border: 1px solid var(--bdr); box-shadow: var(--shadow); }

/* Axis labels for MZ chart */
.chart-wrap { position: relative; }
.axis-lbl {
  position: absolute; font-size: 12px; color: var(--slate);
  pointer-events: none; letter-spacing: .04em;
}

/* ── UTILITY ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.mt-8 { margin-top: 8px; }
.mt-14 { margin-top: 14px; }
.mt-20 { margin-top: 20px; }
.pad-16 { padding: 16px; }
.pad-20 { padding: 20px 24px; }
.mono { font-family: var(--font-m); }
.text-cyan { color: var(--cyan); }
.text-green { color: var(--green); }
.text-amber { color: var(--amber); }
.text-slate { color: var(--slate-lt); }
.fw-700 { font-weight: 700; }
.no-scroll { overflow: hidden; }
.overflow-y { overflow-y: auto; }
.flex-col { display: flex; flex-direction: column; gap: 12px; }


/* ── DRILL DOWN TRANSITIONS ── */
.drill-screen {
  position: absolute; inset: 0;
  background: var(--bg);
  animation: drillSlideIn .28s cubic-bezier(.22,.68,0,1.1);
  /* will-change removed — it created a stacking context that broke position:fixed children */
  overflow-y: auto;
  z-index: 10;
}
.drill-screen.back {
  animation: drillSlideOut .22s cubic-bezier(.4,0,.6,1) forwards;
}
@keyframes drillSlideIn {
  from { opacity: 0; transform: translateX(32px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes drillSlideOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-24px); }
}
.drill-container {
  position: relative;
  min-height: calc(100vh - 56px);
  overflow: hidden;
}

/* ── DRILL TWO-COLUMN LAYOUT ── */
.drill-2col {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: 0;
  min-height: calc(100vh - 56px - 52px); /* minus breadcrumb bar */
  align-items: start;
}
.drill-left {
  border-right: 1px solid var(--bdr);
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.drill-right {
  padding: 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: var(--card-alt);
  min-height: calc(100vh - 56px - 52px);
  position: sticky;
  top: 56px;
  overflow-y: auto;
  max-height: calc(100vh - 56px);
}

/* ── BREADCRUMB BAR ── */
.drill-breadcrumb {
  padding: 10px 24px;
  background: var(--card);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  position: sticky;
  top: 56px;
  z-index: 20;
  box-shadow: 0 1px 4px rgba(14,31,56,.06);
}
.drill-breadcrumb .crumb { color: var(--cyan-dim); font-weight: 600; cursor: pointer; }
.drill-breadcrumb .crumb:hover { text-decoration: underline; }
.drill-breadcrumb .sep { color: var(--slate); }
.drill-breadcrumb .crumb-current { color: var(--text); font-weight: 700; cursor: default; }

/* ── CONSUMER MIX CHARTS ── */
.mix-kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.mix-kpi {
  background: var(--card); border: 1px solid var(--bdr); border-radius: 10px;
  padding: 12px 14px; box-shadow: var(--shadow);
  display: flex; gap: 10px; align-items: flex-start;
}
.mix-kpi-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: rgba(0,180,230,.08); border: 1px solid rgba(0,180,230,.15);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.mix-kpi-val { font-family: var(--font-d); font-size: 22px; font-weight: 800; color: var(--text); }
.mix-kpi-lbl { font-size: 11px; color: var(--slate); margin-bottom: 3px; line-height: 1.3; }
.chart-card {
  background: var(--card); border: 1px solid var(--bdr);
  border-radius: 10px; overflow: hidden; box-shadow: var(--shadow);
}
.chart-card-hdr {
  padding: 10px 16px; border-bottom: 1px solid var(--bdr);
  display: flex; justify-content: space-between; align-items: center;
}
.chart-card-title { font-size: 11px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .06em; }

/* ── US MAP ── */
.us-map-wrap { position: relative; background: var(--card); border-radius: 0 0 10px 10px; }
.us-state { cursor: pointer; transition: opacity .12s; }
.us-state:hover { opacity: .82; }
.state-tooltip {
  position: absolute; pointer-events: none;
  background: rgba(14,31,56,.96); border: 1px solid rgba(255,255,255,.12);
  border-radius: 9px; padding: 10px 14px; min-width: 170px;
  box-shadow: var(--shadow-lg); z-index: 50; font-size: 12px;
}
.state-tooltip h5 { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 7px; }
.state-tooltip .sr { display: flex; justify-content: space-between; margin-bottom: 4px; }
.state-tooltip .sk { color: rgba(255,255,255,.6); }
.state-tooltip .sv { color: #fff; font-weight: 600; }

/* ── CMN RESULTS DRILL ── */
.cmn-drill-overlay {
  position: fixed; inset: 0;
  background: rgba(14,31,56,.45);
  z-index: 400;
  display: flex; align-items: flex-end;
}
.cmn-drill-sheet {
  background: var(--bg);
  width: 100%; height: 82vh;
  border-radius: 18px 18px 0 0;
  overflow: hidden;
  display: flex; flex-direction: column;
  animation: sheetUp .3s cubic-bezier(.22,.68,0,1.1);
  box-shadow: 0 -8px 48px rgba(14,31,56,.2);
}
@keyframes sheetUp {
  from { transform: translateY(100%); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.cmn-drill-sheet-hdr {
  padding: 16px 24px;
  border-bottom: 1px solid var(--bdr);
  background: var(--card);
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.cmn-drill-body {
  flex: 1; overflow-y: auto;
  padding: 20px 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  align-content: start;
}


/* ── DRILL AFFORDANCE ── */
@keyframes pulseRing {
  0%   { transform: scale(1); opacity: .7; }
  50%  { transform: scale(1.18); opacity: .3; }
  100% { transform: scale(1); opacity: .7; }
}
@keyframes bounceRight {
  0%,100% { transform: translateX(0); }
  50%      { transform: translateX(5px); }
}
.drill-hint-bar {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 10px 20px;
  background: linear-gradient(90deg, rgba(0,180,230,.06) 0%, rgba(0,180,230,.1) 50%, rgba(0,180,230,.06) 100%);
  border-top: 1px solid rgba(0,180,230,.2);
  font-size: 13px; color: var(--cyan-dim); font-weight: 600;
  cursor: pointer;
  transition: background .15s;
}
.drill-hint-bar:hover { background: rgba(0,180,230,.14); }
.drill-hint-arrow { animation: bounceRight 1.2s ease infinite; display: inline-block; }
.drill-hint-pulse {
  width: 8px; height: 8px; border-radius: 50%; background: var(--cyan);
  animation: pulse 1.6s ease infinite; flex-shrink: 0;
}

.bubble-cta-overlay {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: var(--navy); color: #fff;
  padding: 9px 20px; border-radius: 20px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(14,31,56,.3);
  pointer-events: none;
  animation: fadeUpIn .5s ease .8s both;
}
@keyframes fadeUpIn {
  from { opacity: 0; transform: translateX(-50%) translateY(8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
.bubble-cta-dot { width:7px; height:7px; border-radius:50%; background:var(--cyan); animation: pulse 1.4s ease infinite; }

/* Step indicator for breadcrumb */
.step-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 50%;
  font-size: 11px; font-weight: 800;
  background: var(--cyan); color: var(--text);
  flex-shrink: 0;
}

/* ── PATH TO PURCHASE MODAL ── */
.ptp-overlay {
  position: fixed; inset: 0; background: rgba(14,31,56,.55); z-index: 800;
  display: flex; align-items: center; justify-content: center;
}
.ptp-modal {
  background: var(--card); border-radius: 16px;
  width: min(860px, 94vw); max-height: 90vh;
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 24px 80px rgba(14,31,56,.35);
  animation: drillSlideIn .25s cubic-bezier(.22,.68,0,1.1);
}
.ptp-hdr {
  padding: 18px 24px; border-bottom: 1px solid var(--bdr);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--navy); color: #fff;
}
.ptp-body { flex:1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

.ptp-funnel { display: flex; flex-direction: column; gap: 6px; }
.ptp-stage {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  background: var(--bg); border: 1px solid var(--bdr); border-radius: 9px;
  transition: all .15s; cursor: pointer;
}
.ptp-stage:hover { border-color: var(--cyan); background: rgba(0,180,230,.04); }
.ptp-stage-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; }
.ptp-stage-bar-wrap { flex:1; height:6px; background:#E2E8F0; border-radius:3px; overflow:hidden; }
.ptp-stage-bar { height:100%; border-radius:3px; transition: width .8s ease; }
.ptp-connector { width:2px; height:16px; background: var(--bdr); margin-left:13px; }

/* ── AUDIENCE / TRIGGER PRESET CARDS ── */

.aud-card { background: var(--card); border: 1.5px solid rgba(99,102,241,.32); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: all .2s; box-shadow: 0 2px 16px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04); position: relative; overflow: hidden; }
.aud-card:hover { border-color: var(--cyan); box-shadow: 0 4px 20px rgba(0,180,230,.12); transform: translateY(-1px); }
.aud-card.selected { border-color: var(--cyan); background: rgba(0,180,230,.03); }
.aud-card-accent { position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 12px 0 0 12px; }
.trig-path { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; padding-left: 10px; margin-bottom: 8px; }
.trig-node { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: var(--bg); border: 1px solid var(--bdr); color: var(--text); white-space: nowrap; }
.trig-node.conversion { background: rgba(5,150,105,.1); border-color: rgba(5,150,105,.3); color: var(--green); }
.trig-arrow { font-size: 10px; color: #CBD5E1; flex-shrink: 0; }
/* ── OPTIMIZE MODAL ── */
.opt-modal-overlay { position: fixed; inset: 0; background: rgba(14,31,56,.45); z-index: 700; display: flex; align-items: center; justify-content: center; }
.opt-modal { background: #fff; border-radius: 16px; padding: 28px; max-width: 480px; width: 92%; box-shadow: 0 28px 72px rgba(14,31,56,.3); max-height: 88vh; overflow-y: auto; }
.opt-action { padding: 14px 16px; border: 1.5px solid var(--bdr); border-radius: 10px; cursor: pointer; transition: all .15s; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.opt-action:hover { border-color: var(--cyan); background: rgba(0,180,230,.04); }
.opt-action-title { font-size: 14px; font-weight: 600; color: var(--text); }
.opt-action-desc { font-size: 12px; color: var(--slate); margin-top: 2px; }
.opt-action-impact { font-size: 13px; font-weight: 700; color: var(--green); }
/* ── CAMPAIGN FORM ── */
.cform-label { font-size: 12px; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
.cform-input { width: 100%; padding: 9px 12px; border: 1px solid var(--bdr); border-radius: 8px; font-size: 13px; color: var(--text); background: var(--card-alt); font-family: var(--font-b); outline: none; transition: border-color .15s; }
.cform-input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
.cform-input::placeholder { color: rgba(238,238,255,.35); }
.cform-input[type="date"], .cform-input[type="number"] { color-scheme: dark; }

/* ── DMA GEO LIGHTBOX ── */
.dma-lightbox-overlay {
  position: fixed; inset: 0;
  background: rgba(14,31,56,.55);
  z-index: 800;
  display: flex; align-items: center; justify-content: center;
  padding: 40px 0;
  animation: fadeIn .18s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.dma-lightbox {
  background: var(--bg);
  width: 100%;
  max-height: calc(100vh - 80px);
  border-radius: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(14,31,56,.4);
  animation: drillSlideIn .25s cubic-bezier(.22,.68,0,1.1);
}
.dma-lightbox-hdr {
  background: var(--navy);
  padding: 18px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.dma-lightbox-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}
.dma-lightbox-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,.12);
  border: none; cursor: pointer;
  color: white; font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.dma-lightbox-close:hover { background: rgba(255,255,255,.22); }
.dma-lb-grid {
  display: grid;
  grid-template-columns: 1fr 1.5fr 1fr;
  gap: 20px;
}
.dma-lb-section {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.dma-lb-section-hdr {
  padding: 11px 16px;
  border-bottom: 1px solid var(--bdr);
  font-size: 11px; font-weight: 700;
  color: var(--text); text-transform: uppercase; letter-spacing: .07em;
  background: var(--card-alt);
}
.dma-lb-kpi-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.dma-lb-kpi {
  background: var(--card);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  padding: 14px 12px;
  text-align: center;
  box-shadow: var(--shadow);
}
.dma-lb-kpi-val {
  font-family: var(--font-d);
  font-size: 22px; font-weight: 800;
  margin-bottom: 4px;
}
.dma-lb-kpi-lbl { font-size: 11px; color: var(--slate); }
/* Clickable bar highlight */
.dma-bar-clickable { cursor: pointer; }
.dma-bar-clickable:hover rect { opacity: .82; }

@keyframes dash-anim {
  to { stroke-dashoffset: -20; }
}
.prob-edge { stroke-dashoffset: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── DRILL-DOWN ENHANCEMENTS ── */
.cohort-detail-hdr { cursor: default; transition: background .15s; }
.cohort-detail-hdr:hover { background: var(--card-alt); }

/* Campaign Builder sidebar icon alignment */
.desk-icon { display: flex; align-items: center; justify-content: center; width: 20px; height: 20px; }
.desk-item.active .desk-icon svg { opacity: 1; }
.desk-icon svg { opacity: 0.65; transition: opacity .15s; }
.desk-item:hover .desk-icon svg, .desk-item.active .desk-icon svg { opacity: 1; }

/* Waterfall bar animation */
@keyframes bar-grow {
  from { width: 0; }
}

/* Segment contribution tab buttons */
.seg-tab-btn { transition: all .15s; }
.seg-tab-btn:hover { opacity: 0.85; }

/* CMN Tab labels — clean sans emoji */
.cmn-tab { font-size: 14px; }

/* Enriched DMA panel */
.dma-detail-panel { animation: fadeSlideIn .2s ease; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Drill panel slide-in */
.drill-panel { animation: fadeSlideIn .18s ease; }

/* ─── Resizable AI chat viewport ─── */
.chat-viewport-resizable {
  resize: vertical;
  overflow: hidden;
  min-height: 520px;
  max-height: 900px;
}
.chat-viewport-resizable::after {
  content: '';
  display: block;
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 8px;
  cursor: ns-resize;
  background: linear-gradient(to bottom, transparent 0%, rgba(0,180,230,0.10) 100%);
  border-top: 1px solid rgba(0,180,230,0.15);
}
.home-wrap { min-height: calc(100vh - 62px); background: var(--bg); }
.home-hero { padding: 36px 40px 32px; background: linear-gradient(135deg, var(--navy) 0%, #162D4F 100%); color: #fff; position: relative; overflow: visible; border-bottom: 3px solid rgba(0,180,230,0.2); }
.home-eyebrow { display: inline-flex; align-items: center; gap: 7px; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(0,180,230,.35); background: rgba(0,180,230,.1); font-size: 11px; font-weight: 700; color: var(--cyan); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; }
.home-title { font-family: var(--font-d); font-size: 38px; font-weight: 700; letter-spacing: -.01em; line-height: 1.35; margin-bottom: 16px; color: #FFFFFF; display: block; }
.home-title span { color: var(--cyan); }
.home-subtitle { font-size: 15px; color: rgba(255,255,255,.65); line-height: 1.6; max-width: none; }

.home-body { display: grid; grid-template-columns: 7fr 3fr; min-height: 760px; align-items: stretch; }
.home-left { padding: 32px 36px; display: flex; flex-direction: column; border-right: 1px solid var(--bdr); }
.home-right { padding: 24px; display: flex; flex-direction: column; gap: 14px; background: var(--card-alt); overflow-y: auto; }
.home-section-label { font-size: 11px; font-weight: 700; color: var(--slate); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
.feat-tile { background: var(--card); border: 1px solid var(--bdr); border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow); }
.feat-tile:hover { border-color: var(--cyan); box-shadow: 0 4px 20px rgba(0,180,230,.12); transform: translateX(3px); }
.feat-tile-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.feat-tile-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.feat-tile-desc { font-size: 12px; color: var(--slate); line-height: 1.45; }
.feat-tile-arrow { margin-left: auto; color: var(--slate); font-size: 16px; flex-shrink: 0; transition: color .15s, transform .15s; }
.feat-tile:hover .feat-tile-arrow { color: var(--cyan); transform: translateX(2px); }
.home-agent-intro { padding: 16px 18px; background: linear-gradient(135deg, rgba(0,180,230,.06), rgba(5,150,105,.04)); border: 1px solid rgba(0,180,230,.2); border-radius: 10px; margin-bottom: 18px; }
.home-chat-wrap { height: auto; display: flex; flex-direction: column; border: 1px solid rgba(99,102,241,.28); border-radius: 10px; overflow: visible; background: var(--card); box-shadow: 0 0 0 1px rgba(99,102,241,.08), 0 8px 32px rgba(0,0,0,.4); }
.mz-intro-wrap { display: flex; flex-direction: column; align-items: center; padding: 0 32px 32px; }

.mz-jump-card-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.mz-jump-card-desc { font-size: 12px; color: var(--slate); }
.mz-jump-card-badge { margin-top: 8px; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--cyan-dim); }
.camp-hub-wrap { display: flex; flex-direction: column; min-height: calc(100vh - 62px); overflow: visible; background: var(--bg); }
.camp-hub-hero { padding: 36px 40px 32px; background: linear-gradient(135deg, var(--navy) 0%, #162D4F 100%); color: #fff; border-bottom: 3px solid rgba(0,180,230,0.2); }
.camp-hub-body { display: flex; flex-direction: column; align-items: center; padding: 0 32px 32px; }

.camp-hub-right { display: none; }
.camp-tool-card { background: var(--card); border: 1.5px solid var(--bdr); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all .18s; box-shadow: var(--shadow); }

.nav-dropdown { position: relative; }
.nav-dropdown-menu {

.splash-logo-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
